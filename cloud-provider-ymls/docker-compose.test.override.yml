# Docker Compose Override para Test Proxy (Puerto 8085)
# Uso: docker compose -f docker-compose.yml -f cloud-provider-ymls/docker-compose.test.override.yml up -d proxy_test

services:
  # Test proxy en puerto 8085 - corre en paralelo con production (8083)
  proxy_test:
    image: ghcr.io/1rgs/claude-code-proxy:main
    container_name: ai-tooling-proxy_test-1
    restart: unless-stopped
    env_file:
      - ./.env
      - profile-envs/cloud.mixed-router.env
    environment:
      - PYTHONUNBUFFERED=1
      - UV_LINK_MODE=copy
      # Modelos configurados para testing (económicos pero funcionales)
      - BIG_MODEL=glm-4.7
      - SMALL_MODEL=deepseek-chat
      # NO sobrescribir aquí para mantener la configuración multi-modelo
      - ANALYSIS_MODEL=anthropic/glm-4.7
      - CLASSIFIER_MODEL=openai/deepseek-chat
      - CLASSIFIER_TIMEOUT=15.0  # Aumentado para evitar timeouts en deepseek
      # Límites de costo para seguridad durante pruebas
      - SESSION_COST_LIMIT_USD=2.00
      - SESSION_COST_WARNING_USD=1.00
    ports:
      - "8085:8082"  # Puerto diferente: 8085 (test) vs 8083 (production)
    volumes:
      - ./vendor/claude-code-proxy:/claude-code-proxy:rw  # RW para hot-reload con cambios locales
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8082 --reload --reload-include '*.py'
    networks:
      - default

  # Production proxy (sin cambios) - sigue corriendo en 8083
  proxy_cloud:
    networks:
      - default
