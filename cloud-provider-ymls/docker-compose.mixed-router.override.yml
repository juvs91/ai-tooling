services:
  proxy_test:
    image: ghcr.io/1rgs/claude-code-proxy:main
    container_name: ai-tooling-proxy_test-1
    restart: unless-stopped
    env_file:
      - ./.env
      - profile-envs/cloud.mixed-router.env
    environment:
      - PYTHONUNBUFFERED=1
      - UV_LINK_MODE=copy
      - BIG_MODEL=glm-4.7
      - SMALL_MODEL=deepseek-chat
      - ANALYSIS_MODEL=anthropic/glm-4.7
      - CLASSIFIER_MODEL=openai/deepseek-chat
      - CLASSIFIER_TIMEOUT=15.0
      - SESSION_COST_LIMIT_USD=2.00
      - SESSION_COST_WARNING_USD=1.00
    ports:
      - "8085:8082"
    volumes:
      - ./vendor/claude-code-proxy:/claude-code-proxy:rw
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8082 --reload --reload-include '*.py'
    networks:
      - default
