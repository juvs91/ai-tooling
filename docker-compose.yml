services:
  proxy_local:
    image: ghcr.io/1rgs/claude-code-proxy:main
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8082:8082"
    volumes:
      - ./vendor/claude-code-proxy:/claude-code-proxy
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8082 --reload --reload-exclude '.venv'

  proxy_cloud:
    image: ghcr.io/1rgs/claude-code-proxy:main
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8083:8082"
    volumes:
      - ./vendor/claude-code-proxy:/claude-code-proxy
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8082 --reload --reload-exclude '.venv'
